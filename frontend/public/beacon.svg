<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Glowing orb background -->
  <circle cx="16" cy="16" r="14" fill="#0f0f1a"/>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="13" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <!-- Crystal/gem shape -->
  <polygon points="16,4 24,12 20,26 12,26 8,12" fill="#4c1d95" stroke="#7c3aed" stroke-width="0.5"/>
  <!-- Inner highlight facets -->
  <polygon points="16,4 24,12 16,14" fill="#7c3aed" opacity="0.8"/>
  <polygon points="16,4 8,12 16,14" fill="#6d28d9" opacity="0.6"/>
  <polygon points="16,14 24,12 20,26 16,20" fill="#5b21b6" opacity="0.7"/>
  <polygon points="16,14 8,12 12,26 16,20" fill="#4c1d95" opacity="0.5"/>
  <!-- Center sparkle -->
  <circle cx="16" cy="13" r="2" fill="#c4b5fd" opacity="0.9"/>
  <!-- Top shine -->
  <circle cx="14" cy="10" r="1" fill="white" opacity="0.5"/>
</svg>
